{% extends "base.html" %}
{% load static %}

{% block title %}Sign In | JobBoard{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-8 shadow-lg">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Welcome Back</h1>
                <p class="text-gray-600 dark:text-gray-400">Sign in to your account</p>
            </div>
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Email</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-600">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-900 dark:text-white mb-2">Password</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-3 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-600">
                </div>
                
                <button type="submit" class="w-full px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-lg hover:from-indigo-700 hover:to-purple-700 transition">
                    Sign In
                </button>
            </form>
            
            <div class="mt-8 pt-8 border-t border-gray-200 dark:border-gray-800 text-center">
                <p class="text-gray-600 dark:text-gray-400 text-sm mb-4">Don't have an account?</p>
                <a href="{% url 'users_views:register' %}" class="text-indigo-600 hover:text-indigo-700 font-medium">
                    Create account
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
