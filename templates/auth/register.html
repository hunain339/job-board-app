{% extends "base.html" %}
{% load static %}

{% block title %}Register | JobBoard{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-8 shadow-lg">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Create Account</h1>
                <p class="text-gray-600 dark:text-gray-400">Choose your account type</p>
            </div>
            
            <div class="space-y-4">
                <a href="{% url 'users_views:register_candidate' %}" class="block p-6 border-2 border-indigo-600 rounded-lg text-center hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition">
                    <i class="fas fa-user text-3xl text-indigo-600 mb-3"></i>
                    <h3 class="font-bold text-lg text-gray-900 dark:text-white mb-2">I'm Looking for a Job</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400">Browse jobs and apply</p>
                </a>
                
                <a href="{% url 'users_views:register_employer' %}" class="block p-6 border-2 border-purple-600 rounded-lg text-center hover:bg-purple-50 dark:hover:bg-purple-900/20 transition">
                    <i class="fas fa-briefcase text-3xl text-purple-600 mb-3"></i>
                    <h3 class="font-bold text-lg text-gray-900 dark:text-white mb-2">I'm Hiring</h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400">Post jobs and find talent</p>
                </a>
            </div>
            
            <div class="mt-8 pt-8 border-t border-gray-200 dark:border-gray-800 text-center">
                <p class="text-gray-600 dark:text-gray-400 text-sm mb-4">Already have an account?</p>
                <a href="{% url 'users_views:login' %}" class="text-indigo-600 hover:text-indigo-700 font-medium">
                    Sign in
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
