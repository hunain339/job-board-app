{% extends "base.html" %}
{% load static %}

{% block title %}Register as Employer | JobBoard{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-8 shadow-lg">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Create Employer Account</h1>
                <p class="text-gray-600 dark:text-gray-400">Post jobs and find the best talent</p>
            </div>
            
            <form method="post" class="space-y-4">
                {% csrf_token %}
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="first_name" class="block text-sm font-medium mb-2">First Name</label>
                        <input type="text" id="first_name" name="first_name" 
                               class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-600">
                    </div>
                    <div>
                        <label for="last_name" class="block text-sm font-medium mb-2">Last Name</label>
                        <input type="text" id="last_name" name="last_name" 
                               class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-600">
                    </div>
                </div>
                
                <div>
                    <label for="email" class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" name="email" required 
                           class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-600">
                </div>

                <div>
                    <label for="company_name" class="block text-sm font-medium mb-2">Company Name</label>
                    <input type="text" id="company_name" name="company_name" required 
                           class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-600">
                </div>

                <div>
                    <label for="company_description" class="block text-sm font-medium mb-2">Company Description</label>
                    <textarea id="company_description" name="company_description" rows="3"
                              class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-600"></textarea>
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-600">
                </div>
                
                <div>
                    <label for="password_confirm" class="block text-sm font-medium mb-2">Confirm Password</label>
                    <input type="password" id="password_confirm" name="password_confirm" required 
                           class="w-full px-4 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-600">
                </div>
                
                <button type="submit" class="w-full px-6 py-3 bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold rounded-lg hover:from-purple-700 hover:to-indigo-700 transition">
                    Create Account
                </button>
            </form>
            
            <div class="mt-6 pt-6 border-t border-gray-200 dark:border-gray-800 text-center">
                <a href="{% url 'users_views:register' %}" class="text-indigo-600 hover:text-indigo-700 font-medium">
                    Back
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
